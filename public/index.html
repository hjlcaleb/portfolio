<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Caleb Hu - Personal Portfolio"
    />
    <title>Caleb Hu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Titillium+Web:ital,wght@1,700&display=swap" rel="stylesheet" />
    <link rel="preload" href="%PUBLIC_URL%/favicon copy.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/introIcons/ferrari.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/introIcons/headset.png" as="image" />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1e1e1e;
        transition: opacity 0.6s ease;
      }
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .ls-ring-wrap {
        position: relative;
        width: 144px;
        height: 144px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ls-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid #2a2a2a;
        border-top-color: #007acc;
        animation: ls-spin 1s linear infinite;
      }
      @keyframes ls-spin {
        to { transform: rotate(360deg); }
      }
      .ls-img {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        object-fit: cover;
      }
      .ls-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .ls-name {
        margin: 0;
        padding: 0;
        color: #9ca3af;
        font-size: 14px;
        letter-spacing: 0.15em;
        font-family: sans-serif;
        animation: ls-pulse 2s ease-in-out infinite;
      }
      @keyframes ls-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="loading-screen">
      <div class="ls-content">
        <div class="ls-ring-wrap">
          <div class="ls-ring"></div>
          <img src="/favicon copy.png" alt="Caleb Hu" class="ls-img" />
        </div>
        <p class="ls-name">caleb hu</p>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
